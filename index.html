<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIPE CENTER DETAIL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden}

h1,h2{font-family:'Orbitron'}
section{padding:60px 18px}

/* HERO REELS */
.hero{
 height:100vh;
 width:100%;
 overflow:hidden;
 position:relative;
}

.reels{
 display:flex;
 height:100%;
 width:300vw;
 transition:.5s;
}

.reel{
 width:100vw;
 height:100vh;
 position:relative;
}

.reel iframe{
 width:100%;
 height:100%;
 border:none;
 object-fit:cover;
 filter:brightness(.6);
}

/* TEXTO SOBRE VIDEO */
.overlay{
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 z-index:2;
}

.overlay h1{
 font-size:32px;
 text-shadow:0 0 25px rgba(255,215,0,.8);
}

.btn{
 margin-top:20px;
 padding:16px 28px;
 border:none;
 border-radius:50px;
 background:linear-gradient(135deg,#FFD700,#ffae00);
 color:#000;
 font-weight:600;
 box-shadow:0 0 25px #FFD700;
}

/* INDICADOR */
.dots{
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:8px;
}

.dot{
 width:10px;
 height:10px;
 border-radius:50%;
 background:#fff3;
}
.dot.active{background:#FFD700}

/* RESTO */
.video-box{border-radius:18px;overflow:hidden}
.video-box iframe{width:100%;height:220px;border:none}

.services{display:flex;flex-direction:column;gap:15px}
.card{padding:22px;border-radius:18px;background:#111;border:1px solid rgba(255,215,0,.2)}

.testimonial{margin-top:15px;padding:18px;border-radius:14px;background:rgba(255,255,255,.05)}

.cta{padding:30px;border-radius:20px;background:#111;text-align:center}

.whats{position:fixed;bottom:20px;right:20px;background:#FFD700;color:#000;padding:18px;border-radius:50%}

@media(min-width:768px){
.overlay h1{font-size:55px}
.video-box iframe{height:400px}
.services{flex-direction:row}
.card{flex:1}
}
</style>
</head>
<body>

<!-- HERO REELS -->
<section class="hero">

<div class="reels" id="reels">

<div class="reel">
<iframe src="https://www.youtube.com/embed/9JfFt3t7OfE?start=5&autoplay=1&mute=1&controls=0&loop=1&playlist=AZAtEk9MBvo"></iframe>
</div>
 
<div class="reel">
<iframe src="https://www.youtube.com/embed/DhGnceFJM6k?start=5&autoplay=1&mute=1&controls=0&loop=1&playlist=DhGnceFJM6k"></iframe>
</div>

<div class="reel">
<iframe src="https://www.youtube.com/embed/Rd8yPKKgv48?start=5&autoplay=1&mute=1&controls=0&loop=1&playlist=KQbWsso5Vfo"></iframe>
</div>

</div>

<div class="overlay">
<h1>LIPE CENTER DETAIL</h1>
<button class="btn" onclick="abrirWhats()">Agendar Agora</button>
</div>

<div class="dots">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

</section>

<!-- RESTO IGUAL -->
<section>
<div class="video-box">
<iframe src="https://www.youtube.com/embed/hvV74pM31o0?start=5&autoplay=1&mute=1&controls=0"></iframe>
</div>
</section>

<section>
<h2>Serviços</h2>
<div class="services">
<div class="card">Polimento Técnico</div>
<div class="card">Vitrificação</div>
<div class="card">Detalhamento</div>
</div>
</section>

<section>
<h2>Clientes</h2>
<div class="testimonial">"Melhor estética que já fui"</div>
<div class="testimonial">"Resultado absurdo"</div>
</section>

<section>
<div class="cta">
<h2>Agenda aberta</h2>
<button class="btn" onclick="abrirWhats()">Chamar no WhatsApp</button>
</div>
</section>

<div class="whats" onclick="abrirWhats()">💬</div>

<script>
function abrirWhats(){window.open('https://wa.me/5599999999999')}

// REELS SWIPE
let current=0
const reels=document.getElementById('reels')
const dots=document.querySelectorAll('.dot')

let startX=0

document.querySelector('.hero').addEventListener('touchstart',e=>{
 startX=e.touches[0].clientX
})

document.querySelector('.hero').addEventListener('touchend',e=>{
 let endX=e.changedTouches[0].clientX

 if(startX - endX > 50){
  if(current<2) current++
 }
 if(endX - startX > 50){
  if(current>0) current--
 }

 reels.style.transform=`translateX(-${current*100}vw)`

 dots.forEach(d=>d.classList.remove('active'))
 dots[current].classList.add('active')
})
</script>

</body>
</html>
