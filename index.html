<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIPE Center Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif}
section{padding:60px 18px}

h1,h2{font-family:'Orbitron',sans-serif}

/* HERO VIVO */
.hero{
 height:100vh;position:relative;overflow:hidden
}
.hero iframe{
 position:absolute;width:100%;height:100%;border:none;
 filter:brightness(.4) saturate(1.2)
}
.hero::before{
 content:"";position:absolute;width:100%;height:100%;
 background:radial-gradient(circle,rgba(255,215,0,.2),transparent 60%);
 animation:pulse 4s infinite
}
@keyframes pulse{
 0%{opacity:.3}
 50%{opacity:.7}
 100%{opacity:.3}
}
.hero-content{
 position:relative;z-index:2;height:100%;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
 text-align:center
}
.hero h1{
 font-size:34px;line-height:1.2;
 text-shadow:0 0 25px rgba(255,215,0,.8)
}

/* BOTÃO VIVO */
.btn{
 margin-top:25px;padding:16px 28px;
 border:none;border-radius:50px;
 background:linear-gradient(135deg,#FFD700,#ffae00);
 color:#000;font-weight:600;
 box-shadow:0 0 20px #FFD700,0 0 40px rgba(255,215,0,.6);
 animation:glow 2s infinite alternate
}
@keyframes glow{
 from{box-shadow:0 0 10px #FFD700}
 to{box-shadow:0 0 30px #FFD700}
}

/* CARDS INTERATIVOS */
.services{display:flex;flex-direction:column;gap:15px}
.card{
 padding:22px;border-radius:18px;
 background:linear-gradient(145deg,#0a0a0a,#111);
 border:1px solid rgba(255,215,0,.2);
 box-shadow:0 0 20px rgba(255,215,0,.15);
 transform:scale(1);
 transition:.3s
}
.card:active{transform:scale(.97)}

/* VIDEO COM VIDA */
.video-box{
 border-radius:18px;overflow:hidden;
 box-shadow:0 0 40px rgba(255,215,0,.2);
 transform:translateY(30px);
 opacity:0;transition:1s
}
.video-box.show{transform:translateY(0);opacity:1}
.video-box iframe{width:100%;height:220px;border:none}

/* DEPOIMENTO */
.testimonial{
 margin-top:15px;padding:18px;border-radius:14px;
 background:rgba(255,255,255,.05);
 backdrop-filter:blur(10px);
 border:1px solid rgba(255,215,0,.2);
 animation:fadeUp 1s
}

/* CTA */
.cta{
 padding:30px;border-radius:20px;
 background:linear-gradient(145deg,#111,#000);
 text-align:center;
 box-shadow:0 0 30px rgba(255,215,0,.2)
}

/* FLOAT */
.whats{
 position:fixed;bottom:20px;right:20px;
 background:#FFD700;color:#000;padding:18px;border-radius:50%;
 box-shadow:0 0 25px #FFD700;
 animation:float 2s infinite
}
@keyframes float{
 0%,100%{transform:translateY(0)}
 50%{transform:translateY(-6px)}
}

/* ANIMAÇÃO */
.fade{
 opacity:0;transform:translateY(40px);
 transition:1s
}
.fade.show{opacity:1;transform:translateY(0)}

@media(min-width:768px){
.hero h1{font-size:60px}
.video-box iframe{height:400px}
.services{flex-direction:row}
.card{flex:1}
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
<iframe src="https://www.youtube.com/embed/hvV74pM31o0?start=5&autoplay=1&mute=1&controls=0&loop=1&playlist=hvV74pM31o0"></iframe>
<div class="hero-content">
<h1>LIPE Center Detail</h1>
<button class="btn" onclick="abrirWhats()">Agendar Agora</button>
</div>
</section>

<!-- VIDEO -->
<section class="fade">
<div class="video-box">
<iframe src="https://www.youtube.com/embed/Rd8yPKKgv48?start=5&autoplay=1&mute=1&controls=0"></iframe>
</div>
</section>

<!-- SERVIÇOS -->
<section class="fade">
<h2>Serviços</h2>
<div class="services">
<div class="card">Polimento Técnico</div>
<div class="card">Vitrificação</div>
<div class="card">Detalhamento</div>
</div>
</section>

<!-- VIDEO 2 -->
<section class="fade">
<div class="video-box">
<iframe src="https://www.youtube.com/embed/9JfFt3t7OfE?start=5&autoplay=1&mute=1&controls=0"></iframe>
</div>
</section>

<!-- DEPOIMENTOS -->
<section class="fade">
<h2>Clientes</h2>
<div class="testimonial">"Melhor estética que já fui"</div>
<div class="testimonial">"Resultado absurdo"</div>
</section>

<!-- CTA -->
<section class="fade">
<div class="cta">
<h2>Agenda aberta</h2>
<button class="btn" onclick="abrirWhats()">Chamar no WhatsApp</button>
</div>
</section>

<div class="whats" onclick="abrirWhats()">💬</div>

<script>
function abrirWhats(){window.open('https://wa.me/5599999999999')}

const fades=document.querySelectorAll('.fade')
window.addEventListener('scroll',()=>{
fades.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-50){el.classList.add('show')}
})
})

const videos=document.querySelectorAll('.video-box')
window.addEventListener('scroll',()=>{
videos.forEach(v=>{
if(v.getBoundingClientRect().top<window.innerHeight-50){v.classList.add('show')}
})
})
</script>

</body>
</html>
