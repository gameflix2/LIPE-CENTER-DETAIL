<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gameflix Mobile Pro</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

body,html{
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    background:#000;color:#fff;height:100%;overflow:hidden;
}

/* ================= PARALLAX ================= */

.scene{
  position:fixed;
  inset:0;
  perspective:1600px;
  overflow:hidden;
  z-index:0;
}

.grid{
  position:absolute;
  width:400%;
  height:400%;
  top:-150%;
  left:-150%;
  background-image:url("paralax.png");
  background-size:420px auto;
  background-repeat:repeat;
  transform: rotateX(20deg) rotateY(-15deg) translateZ(0);
  animation: moveGrid 80s linear infinite;
  filter:brightness(.75);
}

.grid.back{
  transform: rotateX(20deg) rotateY(-15deg) translateZ(-300px);
  filter: blur(6px) brightness(.45);
  animation-duration:120s;
}
.grid.mid{
  transform: rotateX(20deg) rotateY(-15deg) translateZ(-120px);
  filter: blur(2px) brightness(.65);
  animation-duration:100s;
}
.grid.front{
  transform: rotateX(20deg) rotateY(-15deg) translateZ(0);
  animation-duration:80s;
}

@keyframes moveGrid{
  from{ transform: rotateX(20deg) rotateY(-15deg) translate3d(0,0,0);}
  to{ transform: rotateX(20deg) rotateY(-15deg) translate3d(-1200px,-600px,0);}
}

.light{
  position:absolute;
  inset:0;
  background:
  radial-gradient(circle at 30% 40%, rgba(255,255,255,.08), transparent 40%),
  radial-gradient(circle at 70% 60%, rgba(255,255,255,.05), transparent 45%);
  animation: lightMove 25s linear infinite alternate;
}
@keyframes lightMove{
  from{ transform: translateX(-6%);}
  to{ transform: translateX(6%);}
}

.overlay{
  position:absolute;
  inset:0;
  background:
  radial-gradient(circle at center, transparent 30%, black 85%),
  linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,.95));
}

/* ================= HERO ================= */

.hero{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:25px;
}

.logo{
  color:#e50914;
  font-size:1.8rem;
  font-weight:900;
  position:absolute;
  top:25px;
  left:25px;
  letter-spacing:-1.5px;
}

.hero-content{text-align:center}
h1{font-size:2.1rem;margin-bottom:8px;font-weight:800;line-height:1.1}
p{font-size:1.1rem;color:#e6e6e6;margin-bottom:35px}

.email-form{
  display:flex;flex-direction:column;gap:14px;
  width:100%;max-width:350px;margin:0 auto;
}

.email-form input{
  padding:20px;border:1px solid #444;
  background:rgba(0,0,0,.85);color:#fff;
  border-radius:4px;font-size:1.1rem;transition:.3s;
}

.email-form input:focus{
  border-color:#e50914;
  box-shadow:0 0 5px rgba(229,9,20,.5);
}

.btn-cta{
  background:#e50914;color:#fff;
  padding:18px;font-size:1.2rem;border:none;
  border-radius:4px;font-weight:bold;
  display:flex;align-items:center;justify-content:center;
  min-height:60px;cursor:pointer;
}

.spinner{
  display:none;width:24px;height:24px;
  border:3px solid rgba(255,255,255,.3);
  border-radius:50%;border-top-color:#fff;
  animation:spin .8s linear infinite;margin-left:15px;
}
@keyframes spin{to{transform:rotate(360deg)}}

#msgErro{
  color:#ffa00a;font-size:.9rem;margin-top:15px;
  display:none;font-weight:600;
}
</style>
</head>

<body>

<!-- PARALLAX -->
<div class="scene">
  <div class="grid back"></div>
  <div class="grid mid"></div>
  <div class="grid front"></div>
  <div class="light"></div>
  <div class="overlay"></div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="logo">GAMEFLIX</div>

  <div class="hero-content">
    <h1>O jogo começa agora.</h1>
    <p>Entre com seu acesso exclusivo para teste gratis.</p>

    <form class="email-form" id="loginForm">
      <input type="email" id="userLogin" placeholder="Seu login (@testegratis...)" required>
      <button type="submit" id="btnSubmit" class="btn-cta">
        <span id="btnText">VAMOS LÁ</span>
        <div class="spinner" id="loader"></div>
      </button>
    </form>

    <div id="msgErro">Login incorreto. Verifique e tente novamente.</div>
  </div>
</section>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
e.preventDefault();

const input=document.getElementById('userLogin');
const loginDigitado=input.value;
const loginCorreto="@testegratisgameflix";
const btn=document.getElementById('btnSubmit');
const btnText=document.getElementById('btnText');
const loader=document.getElementById('loader');
const erroDisplay=document.getElementById('msgErro');

if(loginDigitado===loginCorreto){
btn.disabled=true;
btnText.innerText="CONECTANDO";
loader.style.display="inline-block";

setTimeout(()=>{
window.location.href="proxima_pagina.html";
},2000);

}else{
input.classList.add('shake-input');
erroDisplay.style.display="block";
setTimeout(()=>input.classList.remove('shake-input'),500);
}
});
</script>

</body>
</html>
