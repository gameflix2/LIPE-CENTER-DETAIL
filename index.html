<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIPE Center Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif}
section{padding:60px 18px}

h1,h2{font-family:'Orbitron',sans-serif}

/* HERO FULL MOBILE */
.hero{
 height:100vh;width:100%;position:relative;overflow:hidden
}
.hero iframe{
 position:absolute;top:0;left:0;width:100vw;height:100vh;
 border:none;object-fit:cover;
 transform:scale(1.2);
 filter:brightness(.5)
}
.hero::before{
 content:"";position:absolute;width:100%;height:100%;
 background:radial-gradient(circle,rgba(255,215,0,.2),transparent 60%);
}
.hero-content{
 position:relative;z-index:2;height:100%;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
 text-align:center
}
.hero h1{font-size:34px;text-shadow:0 0 25px rgba(255,215,0,.8)}

.btn{
 margin-top:25px;padding:16px 28px;
 border:none;border-radius:50px;
 background:linear-gradient(135deg,#FFD700,#ffae00);
 color:#000;font-weight:600;
 box-shadow:0 0 25px #FFD700;
}

.video-box{border-radius:18px;overflow:hidden}
.video-box iframe{width:100%;height:220px;border:none}

.services{display:flex;flex-direction:column;gap:15px}
.card{padding:22px;border-radius:18px;background:#111;border:1px solid rgba(255,215,0,.2)}

.testimonial{margin-top:15px;padding:18px;border-radius:14px;background:rgba(255,255,255,.05)}

.cta{padding:30px;border-radius:20px;background:#111;text-align:center}

.whats{position:fixed;bottom:20px;right:20px;background:#FFD700;color:#000;padding:18px;border-radius:50%}

@media(min-width:768px){
.hero h1{font-size:60px}
.video-box iframe{height:400px}
.services{flex-direction:row}
.card{flex:1}
}
</style>
</head>
<body>

<!-- HERO (AGORA VIDEO 2 COM SOM) -->
<section class="hero">
<iframe src="https://www.youtube.com/embed/Rd8yPKKgv48?start=5&autoplay=1&controls=0&loop=1&playlist=Rd8yPKKgv48"></iframe>
<div class="hero-content">
<h1>Transformação Automotiva Premium</h1>
<button class="btn" onclick="abrirWhats()">Agendar Agora</button>
</div>
</section>

<!-- VIDEO 3 -->
<section>
<div class="video-box">
<iframe src="https://www.youtube.com/embed/9JfFt3t7OfE?start=5&autoplay=1&mute=1&controls=0"></iframe>
</div>
</section>

<!-- SERVIÇOS -->
<section>
<h2>Serviços</h2>
<div class="services">
<div class="card">Polimento Técnico</div>
<div class="card">Vitrificação</div>
<div class="card">Detalhamento</div>
</div>
</section>

<!-- VIDEO 1 -->
<section>
<div class="video-box">
<iframe src="https://www.youtube.com/embed/hvV74pM31o0?start=5&autoplay=1&mute=1&controls=0"></iframe>
</div>
</section>

<!-- DEPOIMENTOS -->
<section>
<h2>Clientes</h2>
<div class="testimonial">"Melhor estética que já fui"</div>
<div class="testimonial">"Resultado absurdo"</div>
</section>

<!-- CTA -->
<section>
<div class="cta">
<h2>Agenda aberta</h2>
<button class="btn" onclick="abrirWhats()">Chamar no WhatsApp</button>
</div>
</section>

<div class="whats" onclick="abrirWhats()">💬</div>

<script>
function abrirWhats(){window.open('https://wa.me/5599999999999')}
</script>

</body>
</html>
